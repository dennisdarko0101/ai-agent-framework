services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - LOG_LEVEL=INFO
      - CHROMA_PERSIST_DIR=/data/chroma
    volumes:
      - chroma-data:/data/chroma
      - workspace:/app/workspace
    depends_on:
      - chromadb
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma-data:
  workspace:
